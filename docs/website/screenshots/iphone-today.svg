<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1300" width="600" height="1300">
  <defs>
    <linearGradient id="bezel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>

  <rect width="600" height="1300" fill="#fafafa"/>

  <!-- Phone bezel -->
  <rect x="30" y="20" width="540" height="1260" rx="70" ry="70" fill="url(#bezel2)"/>
  <!-- Screen -->
  <rect x="50" y="40" width="500" height="1220" rx="52" ry="52" fill="#f2f2f7"/>

  <!-- Dynamic Island -->
  <rect x="230" y="55" width="140" height="34" rx="17" fill="#000"/>

  <!-- Status bar time -->
  <text x="90" y="78" font-family="Helvetica" font-weight="600"
        font-size="18" fill="#000">20:14</text>
  <!-- Battery/signal pills (simplified) -->
  <rect x="470" y="65" width="36" height="14" rx="3" fill="#000" opacity="0.6"/>

  <!-- Nav title -->
  <text x="300" y="150" font-family="Helvetica" font-weight="800"
        font-size="30" text-anchor="middle" fill="#000">Eightful</text>

  <!-- Today section header -->
  <text x="85" y="210" font-family="Helvetica" font-weight="600"
        font-size="14" fill="#666" letter-spacing="1">TODAY</text>

  <!-- Today card -->
  <rect x="70" y="225" width="460" height="150" rx="14" fill="#fff"/>
  <text x="100" y="315" font-family="Helvetica" font-weight="900"
        font-size="68" fill="#ff4040">9,720</text>
  <text x="500" y="280" font-family="Helvetica" font-weight="700"
        font-size="24" text-anchor="end" fill="#000">3 pts</text>
  <text x="500" y="308" font-family="Helvetica"
        font-size="16" text-anchor="end" fill="#8a8a8a">Orange</text>

  <!-- Workout-green banner (illustrative) -->
  <rect x="70" y="395" width="460" height="110" rx="14" fill="#fff"/>
  <circle cx="120" cy="450" r="22" fill="#33e659"/>
  <text x="120" y="460" font-family="Helvetica" font-weight="900"
        font-size="28" text-anchor="middle" fill="#fff">♥</text>
  <text x="165" y="438" font-family="Helvetica" font-weight="700"
        font-size="18" fill="#000">8-point goal reached</text>
  <text x="165" y="466" font-family="Helvetica"
        font-size="15" fill="#666">HIIT: 48 min at 73% of max HR (135 bpm)</text>

  <!-- Permissions section -->
  <text x="85" y="545" font-family="Helvetica" font-weight="600"
        font-size="14" fill="#666" letter-spacing="1">PERMISSIONS</text>
  <rect x="70" y="560" width="460" height="64" rx="14" fill="#fff"/>
  <text x="110" y="600" font-family="Helvetica" font-size="18" fill="#8a8a8a">♥ Manage Health access in Settings</text>

  <!-- Settings section -->
  <text x="85" y="680" font-family="Helvetica" font-weight="600"
        font-size="14" fill="#666" letter-spacing="1">SETTINGS</text>
  <rect x="70" y="695" width="460" height="198" rx="14" fill="#fff"/>
  <text x="110" y="735" font-family="Helvetica" font-size="18" fill="#000">Send me a nudge</text>
  <!-- Toggle on -->
  <rect x="430" y="720" width="70" height="30" rx="15" fill="#33e659"/>
  <circle cx="485" cy="735" r="12" fill="#fff"/>
  <line x1="70" y1="765" x2="530" y2="765" stroke="#ececec" stroke-width="1"/>
  <text x="110" y="797" font-family="Helvetica" font-size="18" fill="#000">At</text>
  <rect x="430" y="782" width="80" height="32" rx="8" fill="#ececec"/>
  <text x="470" y="804" font-family="Helvetica" font-weight="600"
        font-size="16" text-anchor="middle" fill="#000">20:00</text>
  <line x1="70" y1="828" x2="530" y2="828" stroke="#ececec" stroke-width="1"/>
  <text x="110" y="862" font-family="Helvetica" font-size="18" fill="#000">Date of birth</text>
  <text x="500" y="862" font-family="Helvetica"
        font-size="16" text-anchor="end" fill="#666">1 January 1986</text>

  <!-- Tab bar -->
  <rect x="50" y="1190" width="500" height="70" rx="0" fill="#fff"/>
  <line x1="50" y1="1190" x2="550" y2="1190" stroke="#ececec" stroke-width="1"/>
  <g transform="translate(200, 1225)">
    <circle r="16" fill="none" stroke="#ff4040" stroke-width="3"/>
    <text y="6" font-family="Helvetica" font-weight="700"
          font-size="16" text-anchor="middle" fill="#ff4040">✓</text>
  </g>
  <text x="200" y="1255" font-family="Helvetica" font-weight="600"
        font-size="13" text-anchor="middle" fill="#ff4040">Today</text>

  <g transform="translate(400, 1225)" opacity="0.5">
    <rect x="-14" y="-14" width="28" height="28" rx="3" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="-7" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="-7" y1="7" x2="7" y2="7" stroke="#8a8a8a" stroke-width="2"/>
  </g>
  <text x="400" y="1255" font-family="Helvetica" font-size="13"
        text-anchor="middle" fill="#8a8a8a">Compare</text>
</svg>
