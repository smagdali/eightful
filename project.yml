name: StepsToEight
options:
  bundleIdPrefix: org.whitelabel
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  developmentLanguage: en

packages:
  StepsToEightCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    WATCHOS_DEPLOYMENT_TARGET: "9.0"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 86H54WCPYP

targets:

  StepsToEight:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App/iOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: App/Shared
    dependencies:
      - package: StepsToEightCore
        product: StepsToEightCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.whitelabel.stepstoeight
        INFOPLIST_FILE: App/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/iOS/StepsToEight.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  StepsToEightWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: App/Watch
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: App/Shared
    dependencies:
      - target: StepsToEightComplication
        embed: true
      - package: StepsToEightCore
        product: StepsToEightCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.whitelabel.stepstoeight.watchkitapp
        INFOPLIST_FILE: App/Watch/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Watch/StepsToEightWatch.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  StepsToEightComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: App/Complication
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: App/Shared
    dependencies:
      - package: StepsToEightCore
        product: StepsToEightCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.whitelabel.stepstoeight.watchkitapp.widget
        INFOPLIST_FILE: App/Complication/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Complication/StepsToEightComplication.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

schemes:
  StepsToEight:
    build:
      targets:
        StepsToEight: all
    run:
      config: Debug
    archive:
      config: Release

  StepsToEightWatch:
    build:
      targets:
        StepsToEightWatch: all
    run:
      config: Debug
    archive:
      config: Release
